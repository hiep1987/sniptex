name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  js:
    name: js (lint + types + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `tsc && vite build` (see package.json) so this
      # step covers both type-checking and bundling.
      - name: build
        run: pnpm build

  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (free tier). Larger-runner ARM
        # labels (macos-15-arm64, macos-14-xlarge, …) require paid
        # billing and stall in `queued` on free public repos.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ubuntu system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (advisory)
        run: cargo clippy --workspace --all-targets

      - name: test
        run: cargo test --workspace --no-fail-fast
