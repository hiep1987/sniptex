name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest = Apple Silicon on the free public-repo tier.
          # Intel Mac builds were dropped: macos-13 is retired and the only
          # remaining Intel labels (macos-13-large / macos-15-large) require
          # paid Larger Runners. v0.x ships Apple Silicon only.
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SnipTeX ${{ github.ref_name }}'
          releaseBody: |
            See `docs/releasing.md` for the release process. Auto-generated build.

            **Checksums** are attached as `checksums.txt`.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # tauri-action@v0.6.2 generates .sig + .nsis.zip but silently skips
      # uploading them ("Signature not found for the updater JSON. Skipping
      # upload..."). Re-upload them explicitly so the checksums job can
      # build latest.json.
      # tauri-action@v0.6.2 generates .app.tar.gz / .nsis.zip and their
      # .sig files but silently consumes the sigs without uploading them
      # against the Tauri 2 config schema. Re-sign explicitly using the
      # private key (already in env) and upload the .sig alongside the
      # payload that tauri-action did upload.
      - name: sign + upload mac updater sig
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE="${{ github.workspace }}/src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          PAYLOAD="$BUNDLE/SnipTeX.app.tar.gz"
          if [ ! -f "$PAYLOAD" ]; then
            echo "missing payload, cannot sign"
            ls -la "$BUNDLE/" || true
            exit 1
          fi
          npx tauri signer sign --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$PAYLOAD"
          ls -la "$BUNDLE/"
          # tauri-action uploads the payload as `SnipTeX_aarch64.app.tar.gz`
          # (target arch infix added). Rename the sig to match so the
          # latest.json generator + Tauri updater find the right pair.
          gh release upload "${{ github.ref_name }}" \
            "$PAYLOAD.sig#SnipTeX_aarch64.app.tar.gz.sig" --clobber

      - name: zip + sign + upload windows updater
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE="${{ github.workspace }}/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          EXE=$(ls "$BUNDLE"/SnipTeX_*_x64-setup.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ] || [ ! -f "$EXE" ]; then
            echo "missing exe, cannot zip/sign"
            ls -la "$BUNDLE/" || true
            exit 1
          fi
          # Tauri 2 updater for NSIS expects <name>.nsis.zip alongside the
          # .exe; produce it via powershell since we're on Windows runner.
          ZIP="${EXE%.exe}.nsis.zip"
          powershell -Command "Compress-Archive -Path '$EXE' -DestinationPath '$ZIP' -Force"
          npx tauri signer sign --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$ZIP"
          ls -la "$BUNDLE/"
          gh release upload "${{ github.ref_name }}" "$ZIP" "$ZIP.sig" --clobber

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" --dir artifacts --skip-existing

      - name: generate checksums
        run: bash scripts/generate-checksums.sh artifacts

      - name: upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" artifacts/checksums.txt --clobber

      # Tauri 2's updater plugin needs a `latest.json` manifest. tauri-action
      # advertises `includeUpdaterJson: true` but doesn't actually generate
      # it for the Tauri 2 config schema; do it manually from the .sig files
      # we uploaded above.
      - name: generate + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/generate-latest-json.sh "${{ github.ref_name }}" artifacts
