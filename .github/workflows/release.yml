name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest = Apple Silicon on the free public-repo tier.
          # Intel Mac builds were dropped: macos-13 is retired and the only
          # remaining Intel labels (macos-13-large / macos-15-large) require
          # paid Larger Runners. v0.x ships Apple Silicon only.
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SnipTeX ${{ github.ref_name }}'
          releaseBody: |
            See `docs/releasing.md` for the release process. Auto-generated build.

            **Checksums** are attached as `checksums.txt`.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # tauri-action@v0.6.2 generates .sig + .nsis.zip but silently skips
      # uploading them ("Signature not found for the updater JSON. Skipping
      # upload..."). Re-upload them explicitly so the checksums job can
      # build latest.json.
      - name: upload mac updater payload + sig
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="${{ github.workspace }}/src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          echo "BUNDLE=$BUNDLE"
          ls -la "$BUNDLE/" || true
          for f in "$BUNDLE/SnipTeX.app.tar.gz.sig"; do
            if [ -f "$f" ]; then
              echo "uploading: $f"
              gh release upload "${{ github.ref_name }}" "$f" --clobber
            else
              echo "missing: $f"
            fi
          done

      - name: upload windows updater payload + sig
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="${{ github.workspace }}/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          echo "BUNDLE=$BUNDLE"
          ls -la "$BUNDLE/" || true
          for f in "$BUNDLE"/SnipTeX_*_x64-setup.nsis.zip "$BUNDLE"/SnipTeX_*_x64-setup.nsis.zip.sig; do
            if [ -f "$f" ]; then
              echo "uploading: $f"
              gh release upload "${{ github.ref_name }}" "$f" --clobber
            else
              echo "missing: $f"
            fi
          done

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" --dir artifacts --skip-existing

      - name: generate checksums
        run: bash scripts/generate-checksums.sh artifacts

      - name: upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" artifacts/checksums.txt --clobber

      # Tauri 2's updater plugin needs a `latest.json` manifest. tauri-action
      # advertises `includeUpdaterJson: true` but doesn't actually generate
      # it for the Tauri 2 config schema; do it manually from the .sig files
      # we uploaded above.
      - name: generate + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/generate-latest-json.sh "${{ github.ref_name }}" artifacts
